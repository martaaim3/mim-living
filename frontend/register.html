<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - MIM Living</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="logo"><img src="img/logo.png" alt="MIM LIVING"></a>
    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="index.html#novedades">Novedades</a>
      <a href="index.html#publicados">Proyectos publicados</a>
      <a href="login.html" class="btn-login">Iniciar sesión</a>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <p class="section-mini">NUEVA CUENTA</p>
      <h1>Crear cuenta</h1>
      <p class="auth-text">
        Regístrate para empezar a diseñar tus espacios.
      </p>

      <form id="registroForm" class="form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Tu nombre"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tucorreo@gmail.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            placeholder="Crea una contraseña"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary full">Registrarme</button>
        <p id="mensajeRegistro" class="mensaje"></p>
      </form>

      <p class="form-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
