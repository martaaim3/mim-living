<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyectos - MIM Living</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="logo">MIM LIVING</a>

    <nav class="nav">
      <a href="dashboard.html">Inicio</a>
      <a href="project.html">Mis proyectos</a>
      <a href="inspiration.html">Inspiración</a>
      <a href="#" id="logoutBtn" class="btn-login">Cerrar sesión</a>
    </nav>
  </header>

  <main class="projects-page">
    <section class="projects-hero">
      <div>
        <p class="section-mini">GESTIÓN DE PROYECTOS</p>
        <h1>Mis proyectos</h1>
        <p class="projects-text">
          Crea un proyecto y, después, gestiona las estancias que pertenecen a ese proyecto.
        </p>
      </div>
    </section>

    <section class="project-layout">
      <div class="project-form-card">
        <h2>Crear proyecto</h2>

        <form id="projectForm" class="form">
          <div class="form-group">
            <label for="nombreProyecto">Nombre del proyecto</label>
            <input
              type="text"
              id="nombreProyecto"
              name="nombreProyecto"
              placeholder="Ej. Casa Nórdica"
              required
            >
          </div>

          <div class="form-group">
            <label for="descripcionProyecto">Descripción</label>
            <input
              type="text"
              id="descripcionProyecto"
              name="descripcionProyecto"
              placeholder="Ej. Vivienda minimalista en tonos beige"
            >
          </div>

          <button type="submit" class="btn btn-primary full">Guardar proyecto</button>
          <p id="mensajeProyecto" class="mensaje"></p>
        </form>
      </div>

      <div class="project-list-card">
        <div class="project-list-head">
          <h2>Proyectos creados</h2>
          <button id="recargarProyectos" class="btn btn-secondary">Actualizar</button>
        </div>

        <div id="listaProyectos" class="project-list">
          <p class="empty-state">Todavía no hay proyectos cargados.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/project.js"></script>
</body>
</html>
