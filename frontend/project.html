<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyectos - MIM Living</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="topbar">
    <a href="index.html" class="logo"><img src="img/logo.png" alt="MIM LIVING"></a>

    <nav class="nav">
      <a href="dashboard.html">Inicio</a>
      <a href="project.html">Mis proyectos</a>
      <a href="presupuesto.html">Mis presupuestos</a>
      <a href="inspiration.html">Inspiración</a>
      <a href="cuenta.html">Mi cuenta</a>
      <a href="#" id="logoutBtn" class="btn-login">Cerrar sesión</a>
    </nav>
  </header>

  <main class="projects-page">
    <!-- HEADER CON TÍTULO Y BOTÓN -->
    <section class="projects-header-section">
      <div class="projects-header-container">
        <div>
          <p class="section-mini">GESTIÓN DE PROYECTOS</p>
          <h1>Mis proyectos</h1>
        </div>
        <button id="btnNuevoProyecto" class="btn btn-primary">+ Nuevo proyecto</button>
      </div>
    </section>

    <!-- GRID DE PROYECTOS (3 COLUMNAS) -->
    <section class="projects-grid-section">
      <div id="listaProyectos" class="projects-grid-container">
        <p class="empty-state">Todavía no hay proyectos cargados.</p>
      </div>
    </section>

    <!-- MODAL CREAR PROYECTO -->
    <div id="modalNuevoProyecto" class="modal-proyecto-overlay">
      <div class="modal-proyecto-content">
        <button id="btnCerrarModal" class="modal-proyecto-close">✕</button>
        <h2 class="modal-proyecto-title">Crear nuevo proyecto</h2>

        <form id="projectForm" class="form">
          <div class="form-group">
            <label for="nombreProyecto">Nombre del proyecto</label>
            <input type="text" id="nombreProyecto" name="nombreProyecto" placeholder="Ej. Casa Nórdica" required>
          </div>

          <div class="form-group">
            <label for="descripcionProyecto">Descripción</label>
            <input type="text" id="descripcionProyecto" name="descripcionProyecto"
              placeholder="Ej. Vivienda minimalista en tonos beige">
          </div>

          <button type="submit" class="btn btn-primary full">Guardar proyecto</button>
          <p id="mensajeProyecto" class="mensaje"></p>
        </form>
      </div>
    </div>

    <!-- MODAL CONFIRMACIÓN ELIMINAR -->
    <div id="customConfirm" class="modal-overlay" style="display: none;">
      <div class="modal-card">
        <div class="modal-icon">⚠️</div>
        <h3>¿Eliminar proyecto?</h3>
        <p>Esta acción no se puede deshacer y borrará todas las estancias asociadas.</p>
        <div class="modal-buttons">
          <button id="confirmCancel" class="btn btn-secondary">Cancelar</button>
          <button id="confirmDelete" class="btn btn-danger">Eliminar ahora</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/project.js"></script>
</body>

</html>
