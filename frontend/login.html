<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - MIM Living</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="logo"><img src="img/logo.png" alt="MIM LIVING"></div>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="index.html#novedades">Novedades</a>
      <a href="index.html#publicados">Proyectos publicados</a>
      <a href="register.html" class="btn-register">Registrarse</a>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <p class="section-mini">ACCESO PRIVADO</p>
      <h1>Iniciar sesión</h1>
      <p class="auth-text">
        Accede a tu cuenta para gestionar tus proyectos y estancias.
      </p>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tucorreo@gmail.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="contrasena">Contraseña</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            placeholder="Introduce tu contraseña"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary full">Entrar</button>
        <p id="mensaje" class="mensaje"></p>
      </form>

      <p class="form-footer">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </p>
    </div>
  </main>

  <script src="js/login.js"></script>
  
</body>
</html>
